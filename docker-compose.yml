services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    networks:
     - oes-network
    ports:
      - "8080:8080"
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_REDIS_PORT=6379
      - DATABASE_URL=${DB_URL}
      - DATABASE_USER=${DB_USERNAME}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_SECONDS=${JWT_EXPIRATION_SECONDS}
      - FRONTEND_URL=${FRONTEND_URL}
      - API_URL=${API_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

  frontend:
    build:
      context: ./fe
      dockerfile: Dockerfile
    networks:
     - oes-network
    ports:
      - "3000:80"
    depends_on:
      - backend
      - redis

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - oes-network


    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data

  db:
    image: mysql:8.0
    container_name: db
    networks:
      - oes-network
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: oes

networks:
  oes-network:
    driver: bridge

volumes:
  redis_data:
